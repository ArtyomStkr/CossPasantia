<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dias de Pasantia - COSSMIL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.7); }
        }
        .life-bar { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes fade-in {
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-main {
            opacity: 0;
            transform: translateY(20px);
            animation: fade-in 0.6s ease forwards;
        }
        .btn-stats {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .btn-stats:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex flex-col items-center justify-center p-4">

    <div id="loader" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 flex flex-col items-center justify-center z-50">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-white mb-4">
                <i class="fa-solid fa-briefcase mr-2 text-purple-400"></i>DIAS DE PASANTIA
            </h1>
            <h2 class="text-xl font-bold gradient-text mb-6">- COSSMIL -</h2>
            
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 border border-green-500/30 life-bar mx-4 min-w-[200px]">
                <span class="text-white font-bold text-2xl" id="loader-percent">0%</span>
            </div>
        </div>
    </div>

    <div id="main-content" class="w-full max-w-md fade-in-main hidden">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold text-white">
                <i class="fa-solid fa-briefcase mr-2 text-purple-400"></i>DIAS DE PASANTIA
            </h1>
            <h2 class="text-xl font-bold gradient-text">- COSSMIL -</h2>
        </div>

        <div class="bg-gray-800/60 backdrop-blur rounded-2xl p-5 border border-green-500/30 life-bar mb-6">
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-400 text-sm">Progreso</span>
                <span class="text-white font-bold" id="dias-transcurridos">0/45</span>
            </div>
            
            <div class="w-full bg-gray-700 rounded-lg h-8 overflow-hidden border-2 border-gray-600 relative">
                <div class="h-full rounded-md transition-all duration-700 relative overflow-hidden" id="barra-progreso" style="width: 0%">
                    <div class="absolute inset-0 bg-gradient-to-r from-green-500/30 to-transparent"></div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-white font-bold text-lg drop-shadow-lg" id="porcentaje">0%</span>
                </div>
            </div>
            
            <div class="flex justify-between mt-2 text-gray-500 text-xs">
                <span id="fecha-inicio">--/--/----</span>
                <span id="fecha-final">--/--/----</span>
            </div>
        </div>

        <div class="flex justify-center mb-4">
            <canvas id="calendario-canvas" class="rounded-xl"></canvas>
        </div>

        <div class="text-center">
            <a href="stats.html" class="btn-stats inline-flex items-center gap-2 text-white px-6 py-3 rounded-xl">
                <i class="fa-solid fa-chart-bar"></i>
                Ver Estadisticas
            </a>
        </div>
    </div>

    <footer class="mt-8 text-gray-500 text-xs">
        Copyright ArtyomStkr
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
